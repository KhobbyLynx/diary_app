services:
  - type: web
    name: diary-app
    runtime: python
    plan: free
    buildCommand: './build.sh'
    startCommand: 'gunicorn diaryapp.wsgi:application'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: diary-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DEBUG
        value: 'False'
      - key: SECRET_KEY
        generateValue: true
      # --- Manual Vars ---
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

databases:
  - name: diary-db
    plan: free
