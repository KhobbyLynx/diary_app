{% extends 'base.html' %}
{% block title %}Page Not Found - Diary App{% endblock %}
{% block content %}
<div class="text-center py-20">
    <div
        class="w-24 h-24 mx-auto mb-6 bg-charcoal/5 rounded-full flex items-center justify-center"
    >
        <svg
            class="w-12 h-12 text-charcoal/30"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9.172 16.172a4 4 0 015.656 0M9 12h6m-6-4h6m2 5.291A7.962 7.962 0 0112 15c-2.34 0-4.29-.98-5.625-2.508M12 7v4m0 4h.01"
            ></path>
        </svg>
    </div>
    <h1 class="text-4xl font-serif text-charcoal mb-4">404</h1>
    <h2 class="text-2xl font-serif text-charcoal/70 mb-3">Page Not Found</h2>
    <p class="text-charcoal/50 mb-8 max-w-sm mx-auto">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <a
        href="{% url 'dashboard' %}"
        class="inline-flex items-center gap-2 bg-indigo text-offwhite px-8 py-4 rounded-2xl font-medium hover:bg-indigo/90 transition-all duration-300 shadow-lg"
    >
        <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            ></path>
        </svg>
        Return Home
    </a>
</div>
{% endblock %}
