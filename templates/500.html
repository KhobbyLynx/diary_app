{% extends 'base.html' %}
{% block title %}Server Error - Diary App{% endblock %}
{% block content %}
<div class="text-center py-20">
    <div
        class="w-24 h-24 mx-auto mb-6 bg-charcoal/5 rounded-full flex items-center justify-center"
    >
        <svg
            class="w-12 h-12 text-charcoal/30"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"
            ></path>
        </svg>
    </div>
    <h1 class="text-4xl font-serif text-charcoal mb-4">500</h1>
    <h2 class="text-2xl font-serif text-charcoal/70 mb-3">Server Error</h2>
    <p class="text-charcoal/50 mb-8 max-w-sm mx-auto">
        Something went wrong on our end. We're working to fix this issue.
    </p>
    <a
        href="{% url 'dashboard' %}"
        class="inline-flex items-center gap-2 bg-indigo text-offwhite px-8 py-4 rounded-2xl font-medium hover:bg-indigo/90 transition-all duration-300 shadow-lg"
    >
        <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            ></path>
        </svg>
        Return Home
    </a>
</div>
{% endblock %}
